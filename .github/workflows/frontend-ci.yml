name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - apps/frontend/**
      - package.json
      - package-lock.json
      - .github/workflows/frontend-ci.yml
  pull_request:
    paths:
      - apps/frontend/**
      - package.json
      - package-lock.json
      - .github/workflows/frontend-ci.yml

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build:frontend
